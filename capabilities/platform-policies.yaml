naftiko: 1.0.0-alpha2
info:
  label: Lakera Platform — Policies and Projects
  description: 'Lakera Platform — Policies and Projects. CRUD operations for managing Lakera Guard policies and
    projects. Lead operation: Create Policy. Self-contained Naftiko capability covering the Lakera Platform admin
    surface.'
  tags:
  - Lakera
  - Platform
  - Policies
  - Projects
  - Administration
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LAKERA_PLATFORM_API_KEY: LAKERA_PLATFORM_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-policies
    baseUri: https://api.lakera.ai/v2
    description: Lakera Platform policy and project management capability.
    resources:
    - name: policies
      path: /policies
      operations:
      - name: listPolicies
        method: GET
        description: List Policies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createPolicy
        method: POST
        description: Create Policy
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: policies-by-id
      path: /policies/{policy_id}
      operations:
      - name: getPolicy
        method: GET
        description: Get Policy
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: policy_id
          in: path
          type: string
          required: true
      - name: updatePolicy
        method: PUT
        description: Update Policy
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: policy_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
      - name: deletePolicy
        method: DELETE
        description: Delete Policy
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: policy_id
          in: path
          type: string
          required: true
    - name: projects
      path: /projects
      operations:
      - name: listProjects
        method: GET
        description: List Projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createProject
        method: POST
        description: Create Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: projects-by-id
      path: /projects/{project_id}
      operations:
      - name: getProject
        method: GET
        description: Get Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: project_id
          in: path
          type: string
          required: true
      - name: updateProject
        method: PUT
        description: Update Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: project_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
      - name: deleteProject
        method: DELETE
        description: Delete Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: project_id
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: 'Bearer {{env.LAKERA_PLATFORM_API_KEY}}'
      placement: header
  exposes:
  - type: mcp
    namespace: platform-policies-mcp
    port: 9091
    transport: http
    description: MCP adapter for Lakera Platform policies and projects.
    tools:
    - name: lakera-list-policies
      description: List Lakera Guard policies in the organization.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-policies.listPolicies
      outputParameters:
      - type: object
        mapping: $.
    - name: lakera-create-policy
      description: Create a Lakera Guard policy with selected detectors and sensitivity.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-policies.createPolicy
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: lakera-list-projects
      description: List projects in the Lakera platform.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-policies.listProjects
      outputParameters:
      - type: object
        mapping: $.
    - name: lakera-create-project
      description: Create a new project bound to a policy in the Lakera platform.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-policies.createProject
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
